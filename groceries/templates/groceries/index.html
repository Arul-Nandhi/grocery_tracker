<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Tracker | Your Smart Shopping List</title>
    <meta name="description" content="A modern, glassmorphism-styled grocery tracker built with Django and Vanilla JS.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'groceries/css/style.css' %}">
</head>
<body class="dark-theme">
    <div class="glass-bg"></div>
    
    <header>
        <div class="container">
            <div class="nav-content">
                <div class="logo">
                    <i class="fas fa-shopping-basket"></i>
                    <h1>Grocery<span>Tracker</span></h1>
                </div>
                <div class="header-actions">
                    <button id="add-btn" class="btn btn-primary main-add-btn">
                        <i class="fas fa-plus-circle"></i> Add New
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Filters & Search -->
        <section class="controls-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Search items...">
            </div>
            
            <div class="filter-group">
                <select id="category-filter">
                    <option value="all">All Categories</option>
                    <option value="fruits">Fruits</option>
                    <option value="vegetables">Vegetables</option>
                    <option value="dairy">Dairy</option>
                    <option value="bakery">Bakery</option>
                    <option value="meat">Meat</option>
                    <option value="beverages">Beverages</option>
                    <option value="snacks">Snacks</option>
                    <option value="other">Other</option>
                </select>

                <div class="status-tabs">
                    <button class="tab active" data-status="all">All</button>
                    <button class="tab" data-status="pending">Pending</button>
                    <button class="tab" data-status="purchased">Purchased</button>
                </div>
            </div>
        </section>

        <!-- Grocery List Grid -->
        <section id="grocery-container" class="item-grid">
            <!-- Items loaded via JS -->
            <div class="loader-container">
                <div class="loader"></div>
            </div>
        </section>
    </main>

    <!-- Modal for Add/Edit -->
    <div id="item-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add New Item</h2>
                <span class="close-modal">&times;</span>
            </div>
            <form id="item-form">
                {% csrf_token %}
                <input type="hidden" id="item-id">
                <div class="form-group">
                    <label for="item-name">Item Name</label>
                    <input type="text" id="item-name" name="name" required placeholder="e.g. Organic Apples">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="item-quantity">Quantity</label>
                        <input type="number" id="item-quantity" name="quantity" value="1" min="0.1" step="0.1">
                    </div>
                    <div class="form-group">
                        <label for="item-unit">Unit</label>
                        <select id="item-unit" name="unit">
                            <option value="units">Units (pcs)</option>
                            <option value="kg">Kilograms (kg)</option>
                            <option value="g">Grams (g)</option>
                            <option value="ltr">Liters (ltr)</option>
                            <option value="ml">Milliliters (ml)</option>
                            <option value="pkt">Packets (pkt)</option>
                            <option value="box">Box</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="item-category">Category</label>
                    <select id="item-category" name="category">
                            <option value="fruits">Fruits</option>
                            <option value="vegetables">Vegetables</option>
                            <option value="dairy">Dairy</option>
                            <option value="bakery">Bakery</option>
                            <option value="meat">Meat</option>
                            <option value="beverages">Beverages</option>
                            <option value="snacks">Snacks</option>
                            <option value="other" selected>Other</option>
                        </select>
                </div>
                <div class="form-group">
                    <label for="item-notes">Notes (Optional)</label>
                    <textarea id="item-notes" name="notes" placeholder="e.g. Prefer Granny Smith"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary cancel-modal">Cancel</button>
                    <button type="submit" id="save-btn" class="btn btn-primary">Save Item</button>
                </div>
            </form>
        </div>
    </div>



    <script src="{% static 'groceries/js/app.js' %}"></script>
</body>
</html>
